spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/xjco2913?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      max-lifetime: 600000
      idle-timeout: 300000
      keepalive-time: 120000
      connection-timeout: 30000
      validation-timeout: 5000
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
server:
  port: ${PORT:9090}

amap:
  web-service-key: ${AMAP_WEB_SERVICE_KEY:}
